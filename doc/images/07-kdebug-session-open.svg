<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">kdebug session open screenshot guide</title>
  <desc id="desc">Screenshot showing kdebug session.open request and response.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="70" y="66" fill="#14213d" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="700">kdebug: open a reusable debug session</text>
  <rect x="70" y="120" width="500" height="440" rx="16" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="100" y="160" fill="#0f172a" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700">request: open_session.json</text>
  <text x="100" y="210" fill="#334155" font-family="Consolas,monospace" font-size="18">"action": "session.open"</text>
  <text x="100" y="250" fill="#334155" font-family="Consolas,monospace" font-size="18">"daidir": "simv.daidir"</text>
  <text x="100" y="290" fill="#334155" font-family="Consolas,monospace" font-size="18">"fsdb": "waves.fsdb"</text>
  <text x="100" y="330" fill="#334155" font-family="Consolas,monospace" font-size="18">"name": "case_a"</text>
  <rect x="630" y="120" width="500" height="440" rx="16" fill="#0b1220"/>
  <text x="660" y="165" fill="#93c5fd" font-family="Consolas,monospace" font-size="20">$ kdebug --json open_session.json</text>
  <text x="660" y="225" fill="#d1fae5" font-family="Consolas,monospace" font-size="19">ok: true</text>
  <text x="660" y="265" fill="#d1fae5" font-family="Consolas,monospace" font-size="19">session_id: case_a</text>
  <text x="660" y="305" fill="#d1fae5" font-family="Consolas,monospace" font-size="19">transport: uds or file</text>
  <text x="660" y="345" fill="#d1fae5" font-family="Consolas,monospace" font-size="19">backend: Verdi Tcl</text>
  <text x="660" y="460" fill="#bfdbfe" font-family="Arial,Helvetica,sans-serif" font-size="20">Highlight: open once, query many times with target.session_id.</text>
</svg>
