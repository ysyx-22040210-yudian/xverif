<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">xdebug active driver screenshot guide</title>
  <desc id="desc">Split screenshot showing waveform cursor and active RTL driver evidence.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="70" y="66" fill="#14213d" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="700">xdebug: connect waveform symptom to RTL cause</text>
  <rect x="70" y="120" width="520" height="430" rx="16" fill="#0b1220"/>
  <text x="100" y="160" fill="#e5e7eb" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700">Waveform cursor @ 120ns</text>
  <line x1="250" y1="190" x2="250" y2="505" stroke="#f97316" stroke-width="3"/>
  <text x="100" y="225" fill="#93c5fd" font-family="Consolas,monospace" font-size="18">valid  __----________</text>
  <text x="100" y="285" fill="#93c5fd" font-family="Consolas,monospace" font-size="18">ready  ________------</text>
  <text x="100" y="345" fill="#93c5fd" font-family="Consolas,monospace" font-size="18">state  IDLE WAIT WAIT</text>
  <text x="100" y="405" fill="#93c5fd" font-family="Consolas,monospace" font-size="18">data   0x10 0xbe 0xef</text>
  <rect x="630" y="120" width="500" height="430" rx="16" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="660" y="165" fill="#0f172a" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700">trace.active_driver</text>
  <text x="660" y="220" fill="#334155" font-family="Consolas,monospace" font-size="18">signal: top.u_core.ready</text>
  <text x="660" y="260" fill="#334155" font-family="Consolas,monospace" font-size="18">time: 120ns</text>
  <text x="660" y="300" fill="#334155" font-family="Consolas,monospace" font-size="18">active assignment: ready = !fifo_full</text>
  <text x="660" y="340" fill="#334155" font-family="Consolas,monospace" font-size="18">condition: state == WAIT</text>
  <text x="660" y="380" fill="#334155" font-family="Consolas,monospace" font-size="18">source: rtl/core.sv:218</text>
  <text x="660" y="465" fill="#475569" font-family="Arial,Helvetica,sans-serif" font-size="19">Highlight: cursor time in waveform matches requested_time.</text>
</svg>
