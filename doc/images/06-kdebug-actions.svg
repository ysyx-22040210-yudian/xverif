<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">kdebug action catalog screenshot guide</title>
  <desc id="desc">Screenshot showing kdebug actions output and JSON schema preview.</desc>
  <rect width="1200" height="675" fill="#f7fafc"/>
  <text x="70" y="66" fill="#14213d" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="700">kdebug: action catalog</text>
  <rect x="70" y="120" width="520" height="430" rx="16" fill="#111827"/>
  <text x="98" y="162" fill="#93c5fd" font-family="Consolas,monospace" font-size="19">$ kdebug actions</text>
  <text x="98" y="212" fill="#e5e7eb" font-family="Consolas,monospace" font-size="18">@kdebug.actions.v1</text>
  <text x="98" y="254" fill="#e5e7eb" font-family="Consolas,monospace" font-size="18">design: trace.driver, trace.graph</text>
  <text x="98" y="294" fill="#e5e7eb" font-family="Consolas,monospace" font-size="18">wave: value.at, value.batch_at</text>
  <text x="98" y="334" fill="#e5e7eb" font-family="Consolas,monospace" font-size="18">combined: trace.active_driver</text>
  <text x="98" y="374" fill="#e5e7eb" font-family="Consolas,monospace" font-size="18">protocol: apb.query, axi.query</text>
  <rect x="630" y="120" width="500" height="430" rx="16" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="660" y="162" fill="#0f172a" font-family="Consolas,monospace" font-size="18">{</text>
  <text x="690" y="202" fill="#0f172a" font-family="Consolas,monospace" font-size="18">"action": "value.at",</text>
  <text x="690" y="242" fill="#0f172a" font-family="Consolas,monospace" font-size="18">"requires": ["fsdb"],</text>
  <text x="690" y="282" fill="#0f172a" font-family="Consolas,monospace" font-size="18">"schema": "value.at.request",</text>
  <text x="690" y="322" fill="#0f172a" font-family="Consolas,monospace" font-size="18">"example": "value.at.basic.json"</text>
  <text x="660" y="362" fill="#0f172a" font-family="Consolas,monospace" font-size="18">}</text>
  <text x="660" y="470" fill="#475569" font-family="Arial,Helvetica,sans-serif" font-size="19">Highlight: default output for people, --json for scripts and agents.</text>
</svg>
