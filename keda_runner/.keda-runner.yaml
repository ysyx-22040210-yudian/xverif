version: 1
shell: tcsh
workdir: /proj/nic/work
init_steps:
- source /proj/nic/env/setup.csh
- module load gcc/9.3.0
env_snapshot: .keda_runner/env/env.env0
checks:
- make
- vcs
- verdi
actions:
  sim:
    command: make
    fixed_args:
    - -j8
    target:
      required: true
      allowed:
      - compile
      - sim
      - urg
      - clean
    options:
      TEST:
        emit: make_var
        required: true
        pattern: ^[A-Za-z0-9_./+-]+$
      SEED:
        emit: make_var
        pattern: ^[0-9]+$
      WAVES:
        emit: make_var
        values:
        - '0'
        - '1'
  vcs_compile:
    command: vcs
    fixed_args:
    - -full64
    - -sverilog
    target:
      required: false
    options:
      filelist:
        emit: separate
        key: -f
        pattern: ^[A-Za-z0-9_./+-]+$
      top:
        emit: separate
        key: -top
        pattern: ^[A-Za-z_][A-Za-z0-9_]*$
      debug:
        emit: flag
        key: -debug_access+all
      nologo:
        emit: flag
        key: -nologo
