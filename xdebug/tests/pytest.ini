[pytest]
testpaths = unit
python_files = test_*.py
addopts = -ra
markers =
    unit: 不依赖 EDA 数据的单元测试
    contract: CLI、schema、action 和输出协议合同
    synthetic: 自动生成小型 RTL/FSDB/daidir 的测试
    design: daidir/design 查询测试
    waveform: FSDB/waveform 查询测试
    combined: FSDB 与 daidir 联合测试
    active_trace: active driver/trace chain 测试
    apb: APB 查询测试
    axi: AXI 查询测试
    vip: 依赖真实 AMBA VIP 环境的测试
    session: session 生命周期测试
    stdio_loop: xdebug --stdio-loop 协议测试
    mcp: xverif-mcp 完整链路测试
    mcp_direct: MCP direct launcher 测试
    mcp_fake_lsf: MCP fake LSF 测试
    mcp_real_lsf: MCP real LSF 可选测试
    optional_lsf: 不纳入强制门禁的真实 LSF 测试
    realdata: 真实项目 FSDB/daidir 测试
    smoke: 快速冒烟测试
    regression: 常规完整回归
    nightly: 夜间高成本回归
    slow: 高成本测试
